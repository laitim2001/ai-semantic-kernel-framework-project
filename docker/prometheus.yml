# Prometheus scrape config for V2 backend metrics endpoint.
# Sprint 49.4 Day 3 — Observability range cat 12.
#
# The backend exposes /metrics on port 8000 (Phase 49.4 Day 5 wires up).
# This file is mounted read-only into the prometheus container.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: ipa-v2-backend
    metrics_path: /metrics
    static_configs:
      - targets:
          # host.docker.internal resolves to the Docker host on Mac/Win/Linux 20.10+.
          # Adjust to backend container name if backend ever moves into compose.
          - "host.docker.internal:8000"
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: ipa-v2-backend
