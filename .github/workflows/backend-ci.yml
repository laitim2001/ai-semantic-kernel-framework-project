# updated to reflect V2 20/22 (91%) — Phase 54 完成 2/2 with Cat 11
# Subagent Orchestration Level 4 + AD-Cat10-Obs-1 closed. Header touch
# here triggers backend-ci required check for docs-only closeout PR.
#
# Sprint 54.1 closeout sync (2026-05-04): SITUATION-V2-SESSION-START.md
# updated to reflect V2 19/22 (86%) — main progress advance from Cat 10
# Verification Loops; AD-Cat9-1+2+3 closed via D8 wrapper pattern. Header
# touch here triggers backend-ci required check for docs-only closeout PR.
#
# Sprint 53.7 closeout sync (2026-05-04): SITUATION-V2-SESSION-START.md
# updated to reflect V2 18/22 (82%) progress + 9 closed AD + 2 new AD
# (AD-Plan-1 + AD-Lint-2). Header touch here triggers backend-ci required
# check for the docs-only closeout PR (#77).
#
# Known limitation: docs-only / .gitignore-only PRs DO NOT trigger this
# workflow, leading to BLOCKED mergeStateStatus when "Lint + Type Check +
# Test (with PostgreSQL 16)" is in branch protection required_status_checks.
# Workaround: trivially touch a workflow file (e.g., this header comment)
# in the PR to re-trigger. Long-term: revisit required_status_checks
# strategy to allow conditional checks.

name: Backend CI

on:
  push:
    branches: [main, "feature/**", "fix/**", "refactor/**", "chore/**"]
    # Sprint 55.6 (AD-CI-5 / Option Z): paths filter removed — see header comment.
  pull_request:
    # Sprint 55.6 (AD-CI-5 / Option Z): paths filter removed — see header comment.

jobs:
  lint-and-test:
    name: Lint + Type Check + Test (with PostgreSQL 16)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Sprint 49.2: spin up real PostgreSQL 16 (matches docker-compose.dev.yml)
    # so alembic migrations + pytest run against a real DB (NOT SQLite).
    # Per .claude/rules/testing.md AP-10 對策.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ipa_v2
          POSTGRES_PASSWORD: ipa_v2_dev
          POSTGRES_DB: ipa_v2
        options: >-
          --health-cmd "pg_isready -U ipa_v2"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      # Match docker-compose.dev.yml + backend/.env.example
      DATABASE_URL: postgresql+asyncpg://ipa_v2:ipa_v2_dev@localhost:5432/ipa_v2
      DB_POOL_SIZE: "5"
      DB_POOL_MAX_OVERFLOW: "5"
      DB_POOL_RECYCLE_SEC: "300"
      DB_ECHO: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install -r requirements.txt

      - name: Black (code formatting)
        working-directory: backend
        run: black --check src/ tests/

      - name: isort (import ordering)
        working-directory: backend
        run: isort --check-only --profile black src/ tests/

      - name: flake8 (style)
        working-directory: backend
        # Sprint 49.2: strict mode (was `|| true` in 49.1).
        # Config in backend/.flake8 (max-line-length=100, ignores E203/W503).
        run: flake8 src/ tests/

      - name: mypy (strict type check)
        working-directory: backend
        run: mypy src/ --strict
        continue-on-error: false

      - name: Alembic upgrade head
        working-directory: backend
        # Sprint 49.2: full migration cycle from zero against the real PG service.
        run: |
          alembic upgrade head
          alembic current

      - name: pytest (unit + integration with real PostgreSQL)
        working-directory: backend
        run: pytest -v --tb=short
        continue-on-error: false

      - name: Alembic downgrade base (rollback verification)
        working-directory: backend
        # Verify all migrations have working downgrade()
        run: |
          alembic downgrade base
          alembic current
        if: always()

      - name: LLM SDK leak check (LLM-provider-neutrality)
        working-directory: backend
        run: |
          if grep -rE "^(from |import )(openai|anthropic|agent_framework)" src/agent_harness/ src/infrastructure/; then
            echo "ERROR: agent_harness/ + infrastructure/ must not import LLM SDKs directly"
            exit 1
          fi
          echo "OK: no LLM SDK imports in agent_harness/ + infrastructure/"
