# Backend CI workflow.
#
# Triggers (since Sprint 55.6 — closes AD-CI-5 per Option Z):
#   - EVERY pull_request (no paths filter)
#   - EVERY push to main / feature/* / fix/* / refactor/* / chore/*
#
# Why no paths filter:
#   Branch protection's required_status_checks list includes
#   "Lint + Type Check + Test (with PostgreSQL 16)" + "v2-lints" jobs from this
#   workflow. Path-filtering blocked docs-only / .gitignore-only PRs because the
#   workflow never triggered → required contexts never reported → mergeStateStatus
#   = BLOCKED. Sprint 53.2.5 introduced the touch-header workaround (touch this
#   file's header to force trigger). Sprint 55.6 retires the workaround
#   permanently by removing the paths filter — every PR runs full backend CI.
#   Trade-off: ~+1.5 min CI per docs-only PR. Acceptable for solo-dev volume.
#
# Historical workaround commits below kept for audit trail.
# -----------------------------------------------------------------------------
#
# Sprint 55.3 closeout sync (2026-05-04): SITUATION-V2-SESSION-START.md
# §9 row updated with PR #87 merge SHA `4d17a5cd` (Audit Cycle Mini-Sprint #1
# Groups A + G — 6 ADs closed; pytest 1416 → 1434 (+18); 7 V2 lints; calibration
# ratio 2.81 way over band drives AD-Sprint-Plan-4 scope-class matrix proposal).
# Header touch here triggers backend-ci required check for docs-only closeout PR.
#
# Sprint 55.2 closeout sync (2026-05-04): SITUATION-V2-SESSION-START.md +
# CLAUDE.md updated to reflect **V2 22/22 (100%) closure** — V2 重構完成;
# AD-BusinessDomainPartialSwap-1 closed at 3 layers; calibration multiplier
# 0.40 first hit ratio 1.10 in band; Phase 56+ SaaS Stage 1 candidate scope
# documented. Header touch here triggers backend-ci required check for
# docs-only closeout PR.
#
# Sprint 55.1 closeout sync (2026-05-04): SITUATION-V2-SESSION-START.md +
# CLAUDE.md updated to reflect V2 21/22 (95%) — Business domain production
# service layer (Incident production CRUD + 4 read-only services +
# BUSINESS_DOMAIN_MODE flag + BusinessServiceFactory). Header touch here
# triggers backend-ci required check for docs-only closeout PR.
#
# Sprint 55.1 checklist bookkeeping (2026-05-04, post-closeout): commit
# 32-line [x] marks for §4.6/4.7/4.8 (PR #82/#83 actual work landed via
# closeout PR #83 but checklist `[x]` marks were never pushed back). Header
# touch here applies the paths-filter workaround for this docs-only PR.
#
# Sprint 53.2.5 closeout sync (2026-05-03): SITUATION-V2-SESSION-START.md +
# CLAUDE.md updated to reflect V2 14/22 progress + Solo-dev policy + Paths
