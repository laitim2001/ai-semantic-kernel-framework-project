# Sprint 53.7 paths-filter trigger workaround (AD-CI-5 pattern):
# When a PR is backend-only (no frontend/** changes), this workflow's
# paths filter doesn't match → "Frontend E2E (chromium headless)" job
# context never reports → branch protection blocks merge because that
# context is now in required_status_checks (since 53.7 Day 2 admin op).
# Workaround: touching this file forces the workflow to run.
# Long-term fix tracked as AD-CI-5 (revisit paths-filter strategy).

name: Playwright E2E

# Sprint 55.6 (AD-CI-5 / Option Z): paths filter removed.
# Same rationale as backend-ci.yml — branch protection's required_status_checks
# includes "Frontend E2E (chromium headless)" from this workflow, so the touch-
# header workaround was needed for backend-only PRs to satisfy this required
# context. Removing paths filter retires the workaround permanently. Every PR
# runs full Playwright E2E (~+50 sec for backend-only PRs). Acceptable for
# solo-dev volume.

on:
  push:
    branches: [main, "feature/**", "fix/**", "refactor/**"]
  pull_request:
  # Sprint 57.14 (AD-Visual-Baseline-Generation): manual trigger to (re)generate
  # the visual-regression.spec.ts screenshot baselines on the Linux runner and
  # commit them back to the branch. Run this once to bootstrap (none committed
  # yet), and again whenever a UI change legitimately moves the screenshots.
  # See the `visual-baseline` job below + frontend/CONVENTION.md §e2e visual
  # baselines. (The regular `e2e` job is skipped on this event — it'd run
  # against the pre-commit checkout, so there's nothing useful for it to do.)
  workflow_dispatch:

# Avoid running an old commit's workflow when newer ones land on the same ref.
concurrency:
  group: playwright-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Frontend E2E (chromium headless)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # On the manual visual-baseline trigger we only want the visual-baseline job.
    if: github.event_name != 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers (chromium + deps)
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Build production bundle
        working-directory: frontend
        run: npm run build

      - name: Run Playwright tests
        working-directory: frontend
        env:
          CI: "1"
        run: npx playwright test --reporter=list

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  # Sprint 57.14 (AD-Visual-Baseline-Generation): manual-only. Regenerates the
  # visual-regression.spec.ts screenshot baselines on the Linux runner (so they
  # match CI) and commits them back. Once the *-snapshots/ dir lands in the repo,
  # visual-regression.spec.ts un-skips itself (its guard checks for the dir) and
  # runs as part of the regular `e2e` job on every push/PR. Re-run this job when
  # a UI change legitimately moves the screenshots.
  visual-baseline:
    name: Regenerate visual-regression baselines (Linux, manual)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers (chromium + deps)
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Build production bundle
        working-directory: frontend
        run: npm run build

      - name: Generate / update visual baselines
        working-directory: frontend
        env:
          RUN_VISUAL: "1"
        run: npx playwright test visual --update-snapshots --reporter=list

      - name: Commit baselines if changed
        working-directory: frontend
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tests/e2e/visual/**/*-snapshots/ || true
          if git diff --cached --quiet; then
            echo "no baseline changes"
          else
            git commit -m "chore(e2e): regenerate visual-regression baselines [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi

      - name: Upload generated baselines as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-baselines
          path: frontend/tests/e2e/visual/**/*-snapshots/
          retention-days: 14
          if-no-files-found: ignore
