name: Frontend Lighthouse CI

# Informational-only Lighthouse CI (Sprint 57.13 US-B7). Runs on PRs that touch
# frontend code; reports perf / a11y / best-practices against the public login
# page (the one route that renders fully without auth/backend). a11y is a hard
# gate (>= 0.9) inside lighthouserc.cjs; the rest are warnings. The whole job is
# `continue-on-error: true` so it never blocks merge — it's a budget tripwire,
# not a required check. Reports upload to temporary-public-storage (no token).

on:
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-lighthouse.yml"

jobs:
  lighthouse:
    name: Lighthouse (frontend, informational)
    runs-on: ubuntu-latest
    timeout-minutes: 12
    continue-on-error: true
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run Lighthouse CI
        # `npm run lhci` resolves node_modules/.bin/lhci from @lhci/cli (not the
        # unrelated squatted `lhci` package on the registry — never `npx lhci`).
        run: npm run lhci
        env:
          LHCI_BUILD_CONTEXT__CURRENT_HASH: ${{ github.event.pull_request.head.sha }}
