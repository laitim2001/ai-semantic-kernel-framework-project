# V2 Lint workflow — Sprint 49.4 Day 4.
# Runs the 4 V2-specific lint rules + 4-rule unit tests on every PR.
# Existing backend-ci.yml continues to handle black/isort/flake8/mypy/pytest.

name: V2 Lint

on:
  pull_request:
    paths:
      - "backend/src/**"
      - "scripts/lint/**"
      - "backend/tests/unit/scripts/lint/**"
      - ".github/workflows/lint.yml"
  push:
    branches: [main]
    paths:
      - "backend/src/**"
      - "scripts/lint/**"

permissions:
  contents: read

jobs:
  v2-lints:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install minimal deps for lint scripts
        run: |
          python -m pip install --upgrade pip
          # Lint scripts use stdlib only; tests need pytest.
          pip install pytest==9.0.2 pytest-asyncio==1.3.0

      - name: Lint 1 — no duplicate @dataclass in agent_harness/
        run: python scripts/lint/check_duplicate_dataclass.py --root backend/src/agent_harness

      - name: Lint 2 — no private cross-category imports
        run: python scripts/lint/check_cross_category_import.py --root backend/src/agent_harness

      - name: Lint 3 — sync/async ABC override consistency
        run: python scripts/lint/check_sync_callback.py --root backend/src

      - name: Lint 4 — LLM SDK only inside adapters/<provider>/
        run: python scripts/lint/check_llm_sdk_leak.py --root backend/src

      - name: Lint 5 — AP-1 (Pipeline disguised as Loop)
        run: python scripts/lint/check_ap1_pipeline_disguise.py --root backend/src

      - name: Lint rule unit tests (PASS + FAIL fixtures)
        working-directory: backend
        run: pytest tests/unit/scripts/lint -v
