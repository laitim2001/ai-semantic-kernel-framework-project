# IPA Platform - CI Pipeline
# Sprint 0: Infrastructure Foundation → Sprint 121: CI/CD Enhancement
#
# Triggers:
#   - Push to main/develop branches
#   - Pull requests to main/develop branches
#
# Jobs:
#   1. lint: Backend code quality checks (Black, isort, flake8, mypy)
#   2. frontend-test: Frontend lint, typecheck, build (parallel with lint)
#   3. test: Run pytest with coverage (parallel with lint)
#   4. build: Build Docker images (only on main branch)

name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # ===========================================================================
  # Lint Job - Code Quality Checks
  # ===========================================================================
  lint:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          pip install --upgrade pip
          # Sprint 52.6 US-1 expanded (AD-5): install dev extras (gives types-requests
          # for mypy stubs); matches backend-ci.yml pattern.
          pip install -e ".[dev]"
          # ruff is not in dev extras — install separately (used by Run Ruff step).
          pip install ruff
          pip install -r requirements.txt

      - name: Run Black (formatting)
        run: |
          cd backend
          black --check --diff .

      - name: Run isort (import sorting)
        run: |
          cd backend
          isort --check-only --diff .

      - name: Run Ruff (linting)
        run: |
          cd backend
          ruff check .

      - name: Run mypy (type checking)
        run: |
          cd backend
          mypy src/ --ignore-missing-imports

  # ===========================================================================
  # Frontend Test Job - Lint, TypeCheck, Build (parallel with lint)
  # ===========================================================================
  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: ESLint check
        working-directory: frontend
        run: npm run lint

      - name: TypeScript check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: frontend
        run: npm run build

  # ===========================================================================
  # Test Job - Unit and Integration Tests (parallel with lint)
  # ===========================================================================
  test:
    name: Tests
    runs-on: ubuntu-latest

    services:
      # PostgreSQL service container
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      # Redis service container
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          pip install --upgrade pip
          # Sprint 52.6 US-7 fixup (AD-5): install package + dev extras so
          # `from infrastructure.db import ...` (root conftest) resolves AND
          # pytest / pytest-asyncio / pytest-cov are available.
          pip install -e ".[dev]"
          pip install -r requirements.txt

      - name: Run tests with coverage
        env:
          APP_ENV: testing
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: test_db
          DB_USER: test_user
          DB_PASSWORD: test_password
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_PASSWORD: ""
          # Mock Azure OpenAI for tests
          AZURE_OPENAI_ENDPOINT: ""
          AZURE_OPENAI_API_KEY: ""
        run: |
          cd backend
          pytest --cov=src --cov-report=xml --cov-report=term-missing -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage.xml
          fail_ci_if_error: false
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ===========================================================================
  # Build Job - Docker Image (Only on main branch)
  # ===========================================================================
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test, frontend-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Docker image
        run: |
          docker build \
            --tag ipa-platform:${{ github.sha }} \
            --tag ipa-platform:latest \
            --file backend/Dockerfile \
            backend/

      - name: Build Frontend Docker image
        run: |
          docker build \
            --tag ipa-frontend:${{ github.sha }} \
            --tag ipa-frontend:latest \
            --file frontend/Dockerfile \
            frontend/

      # TODO: Push to Azure Container Registry when configured
      # - name: Login to Azure Container Registry
      #   uses: docker/login-action@v3
      #   with:
      #     registry: ${{ secrets.ACR_REGISTRY }}
      #     username: ${{ secrets.ACR_USERNAME }}
      #     password: ${{ secrets.ACR_PASSWORD }}
      #
      # - name: Push to ACR
      #   run: |
      #     docker tag ipa-platform:${{ github.sha }} ${{ secrets.ACR_REGISTRY }}/ipa-platform:${{ github.sha }}
      #     docker push ${{ secrets.ACR_REGISTRY }}/ipa-platform:${{ github.sha }}

  # ===========================================================================
  # Summary
  # ===========================================================================
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [lint, frontend-test, test]
    if: always()

    steps:
      - name: Check results
        run: |
          if [ "${{ needs.lint.result }}" == "success" ] && \
             [ "${{ needs.frontend-test.result }}" == "success" ] && \
             [ "${{ needs.test.result }}" == "success" ]; then
            echo "All CI checks passed!"
            exit 0
          else
            echo "Some CI checks failed"
            echo "  - Lint: ${{ needs.lint.result }}"
            echo "  - Frontend: ${{ needs.frontend-test.result }}"
            echo "  - Test: ${{ needs.test.result }}"
            exit 1
          fi
