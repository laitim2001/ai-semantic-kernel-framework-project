# Golden corpus for the memory recall-strategy precision A/B (Sprint 57.158).
#
# Each case = ONE user with many facts + a natural-language query + the gold-relevant fact ids.
# The A/B compares three recall arms' top-k over `facts`:
#   profile  (confidence-desc, query-agnostic) / keyword (substring) / semantic (cosine, real embeddings)
#
# DISCRIMINATION (the point of the corpus — see plan §3.2 / D-corpus-discriminates):
# a case DISCRIMINATES when its gold fact(s) sit OUTSIDE the top-5-by-confidence AND the query is
# not a substring of the gold content. Then profile MISSES (gold not in top-5 confidence) and
# keyword MISSES (a question is not a substring of a statement) — only semantic (real embeddings,
# synonym-aware) can surface it. >= 50% of cases must discriminate or the A/B proves nothing.
# The offline test asserts the discrimination property statically (via rank_profile).
#
# NOTE: with a hash-based DeterministicEmbeddingClient the offline semantic arm is near-random —
# the semantic ADVANTAGE is provable ONLY on the RUN_AZURE_INTEGRATION=1 run (real text-embedding).
#
# Confidence convention: 0.85-0.99 = high (fills profile top-5); 0.30-0.50 = low (below top-5 in a
# 12-fact case) — discriminating gold facts are deliberately low-confidence.

cases:
  # 1 — DISCRIMINATING: the datastore fact is low-conf + phrased "Aurora Postgres", query says "database".
  - id: which_database
    query: "which database are we using in production?"
    gold_fact_ids: [db]
    facts:
      - { id: name, content: "The user's name is Priya.", confidence: 0.95 }
      - { id: role, content: "Priya is a staff platform engineer on the payments team.", confidence: 0.92 }
      - { id: tz, content: "Priya works in the Singapore timezone (GMT+8).", confidence: 0.90 }
      - { id: standup, content: "The team runs daily standup at 9:30am.", confidence: 0.88 }
      - { id: lang, content: "The team's primary backend language is Go.", confidence: 0.86 }
      - { id: db, content: "Our primary production datastore is Aurora Postgres with a read replica.", confidence: 0.40 }
      - { id: cache, content: "We put a write-through Redis cache in front of hot reads.", confidence: 0.38 }
      - { id: ci, content: "CI runs on GitHub Actions with a 20-minute budget.", confidence: 0.35 }
      - { id: oncall, content: "On-call rotation is weekly, handed over on Mondays.", confidence: 0.33 }
      - { id: region, content: "Primary region is ap-southeast-1.", confidence: 0.32 }
      - { id: iac, content: "Infrastructure is managed with Terraform.", confidence: 0.30 }
      - { id: dash, content: "Dashboards live in Grafana.", confidence: 0.30 }

