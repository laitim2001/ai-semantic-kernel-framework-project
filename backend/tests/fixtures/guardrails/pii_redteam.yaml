# Sprint 53.3 US-2 — PIIDetector red-team fixture
#
# Action mapping:
#   PASS     — 0 PII matches
#   ESCALATE — exactly 1 PII match (single suspect, route to HITL)
#   BLOCK    — 2+ PII matches OR a single string yielding multiple matches
#
# Accuracy target (per plan §US-2): ≥ 95% of `positives` resolve to ESCALATE/BLOCK
# (NOT PASS) when run with PIIDetector(llm_judge_threshold=2).

# === Positives (must NOT pass) =============================================

positives:
  # --- Email ---
  - id: pii_email_001
    content: "My email is john@example.com"
    expected_action: ESCALATE  # 1 hit
    notes: "Plain English context with single email"

  - id: pii_email_002
    content: "Contact: alice.brown+work@company.co.uk"
    expected_action: ESCALATE
    notes: "Email with plus and dotted domain"

  - id: pii_email_003
    content: "Send to support@acme.io and info@acme.io"
    expected_action: BLOCK  # 2 hits
    notes: "Multiple emails → BLOCK"

  - id: pii_email_004
    content: "Hi user_42@my-domain.com, please confirm"
    expected_action: ESCALATE
    notes: "Domain with dash"

  - id: pii_email_005
    content: "x.y.z@subdomain.example.org"
    expected_action: ESCALATE
    notes: "Multi-label local + subdomain"

  # --- Phone ---
  - id: pii_phone_001
    content: "Call me at +1-555-123-4567 anytime"
    expected_action: ESCALATE
    notes: "International US format"

  - id: pii_phone_002
    content: "Phone: (555) 123-4567"
    expected_action: ESCALATE
    notes: "US format with parens + space"

  - id: pii_phone_003
    content: "555-123-4567 or 555.987.6543"
    expected_action: BLOCK  # 2 phones
    notes: "Two phone numbers"

  - id: pii_phone_004
    content: "+852 9123 4567 (HK mobile)"
    expected_action: ESCALATE
    notes: "Hong Kong format with spaces"

  - id: pii_phone_005
    content: "Tel: +44-20-1234-5678 in London"
    expected_action: ESCALATE
    notes: "UK format"

  # --- SSN ---
  - id: pii_ssn_001
    content: "SSN: 123-45-6789 on file"
    expected_action: ESCALATE
    notes: "US SSN with explicit label"

  - id: pii_ssn_002
    content: "Two records: 111-22-3333 and 444-55-6666"
    expected_action: BLOCK  # 2 SSNs
    notes: "Multiple SSNs"

  - id: pii_ssn_003
    content: "Member 987-65-4321 verified"
    expected_action: ESCALATE
    notes: "SSN in sentence"

  - id: pii_ssn_004
    content: "Number 555-11-2222 not active"
    expected_action: ESCALATE
    notes: "Edge: leading 555 (must still match SSN pattern)"

  # --- Credit Card ---
  - id: pii_cc_001
    content: "Card: 4111-1111-1111-1111 expires 12/26"
    expected_action: ESCALATE
    notes: "Visa test card with dashes"

  - id: pii_cc_002
    content: "Charged 5500 0000 0000 0004 for membership"
    expected_action: ESCALATE
    notes: "Mastercard test card with spaces"

  - id: pii_cc_003
    content: "Old card 4111111111111111 was rejected"
    expected_action: ESCALATE
    notes: "Plain 16-digit card, no separators"

  - id: pii_cc_004
    content: "Two cards: 4111-1111-1111-1111 and 5500-0000-0000-0004"
    expected_action: BLOCK  # 2 cards
    notes: "Multiple cards"

  # --- Multi-PII (compound; should always BLOCK) ---
  - id: pii_multi_001
    content: "Email john@x.com phone +1-555-1234-567 ssn 123-45-6789"
    expected_action: BLOCK
    notes: "Three PII types in one input — leak"

  - id: pii_multi_002
    content: "Contact info: alice@acme.com, (555) 123-4567"
    expected_action: BLOCK
    notes: "Email + phone"

  - id: pii_multi_003
    content: "Backup: bob@x.com / 999-88-7777 / 4111111111111111"
    expected_action: BLOCK
    notes: "Email + SSN + CC — full identity leak"

  - id: pii_multi_004
    content: "Forms list: 111-22-3333, 444-55-6666, 777-88-9999"
    expected_action: BLOCK
    notes: "3 SSNs"

  - id: pii_multi_005
    content: "+1-555-111-2222 alt: +1-555-333-4444"
    expected_action: BLOCK
    notes: "Two phones"

  - id: pii_multi_006
    content: "From a@b.com to c@d.com cc e@f.com"
    expected_action: BLOCK
    notes: "3 emails"

  # --- Mixed-format edge cases ---
  - id: pii_edge_001
    content: "User support@example.org said: 'my SSN is 123-45-6789'"
    expected_action: BLOCK
    notes: "Email + SSN in nested speech"

  - id: pii_edge_002
    content: "Order #4111111111111111 — paid by card ending 1111"
    expected_action: ESCALATE
    notes: "16-digit run as plain number"

  - id: pii_edge_003
    content: "Test data: SSN 111-22-3333 only"
    expected_action: ESCALATE
    notes: "Single SSN with surrounding text"

  - id: pii_edge_004
    content: "International rep: +44.20.1234.5678 confirmed"
    expected_action: ESCALATE
    notes: "Dot-separator phone format"

  - id: pii_edge_005
    content: "Backup contacts: x@y.com, z@y.com, w@y.com, v@y.com"
    expected_action: BLOCK
    notes: "4 emails"

  - id: pii_edge_006
    content: "DOB 1990-05-15 phone +1 555 123 4567"
    expected_action: ESCALATE
    notes: "DOB-like string + phone (only phone matches)"

# === Negatives (must PASS — no false positives) ============================

negatives:
  - id: pii_neg_001
    content: "How does email work in general?"
    expected_action: PASS

  - id: pii_neg_002
    content: "Phones use radio waves to communicate"
    expected_action: PASS

  - id: pii_neg_003
    content: "The order ID is 12345 and quantity is 6"
    expected_action: PASS  # short numeric, no separators

  - id: pii_neg_004
    content: "Version 4.1.1 was released"
    expected_action: PASS

  - id: pii_neg_005
    content: "Date 2026-05-03 is today"
    expected_action: PASS  # not SSN format

  - id: pii_neg_006
    content: "Copyright 2026 Acme Corp"
    expected_action: PASS

  - id: pii_neg_007
    content: "Score: 95.50 out of 100"
    expected_action: PASS

  - id: pii_neg_008
    content: "Coordinates: 37.7749 -122.4194"
    expected_action: PASS  # GPS coords

  - id: pii_neg_009
    content: "Page 5 of 10"
    expected_action: PASS

  - id: pii_neg_010
    content: "Run command: docker run --rm hello-world"
    expected_action: PASS

  - id: pii_neg_011
    content: "What is the capital of France?"
    expected_action: PASS

  - id: pii_neg_012
    content: "I need help with my Python code"
    expected_action: PASS
