# Completeness Rules Configuration
# Define required/optional fields per intent category.
# Modify thresholds, add fields, or adjust patterns without changing code.

rules:
  incident:
    threshold: 0.60
    description: "事件/故障報告完整度檢查"
    required_fields:
      - name: affected_system
        display_name: 受影響系統
        description: 發生問題的系統或服務名稱
        patterns:
          - "(?:系統|服務|平台|模組|應用)[：:]\\s*([^\\s,，。]+)"
          - "([A-Z][A-Za-z0-9_-]+)\\s*(?:系統|服務|平台)?(?:掛了|故障|出問題|失敗|錯誤)"
          - "(?:ETL|API|DB|CRM|ERP|SAP|Oracle|SQL|Redis|MongoDB|Kafka|RabbitMQ)"
        keywords: [系統, 服務, 平台, 模組, 應用, ETL, API, 資料庫, CRM, ERP, SAP, 網站, APP, 後台]
        examples: [ETL 系統, CRM 服務, 訂單系統, API Gateway]

      - name: symptom_type
        display_name: 症狀類型
        description: 問題的症狀或表現
        patterns:
          - "(失敗|錯誤|故障|掛了|當機|超時|延遲|緩慢|異常|無法|不能)"
          - "(error|fail|timeout|slow|crash|down|unavailable)"
        keywords: [失敗, 錯誤, 故障, 掛, 當機, 超時, 延遲, 慢, 異常, 無法, 不能, 問題, error, fail]
        examples: [執行失敗, 回應超時, 系統當機, 效能緩慢]

      - name: urgency
        display_name: 緊急程度
        description: 問題的緊急程度或業務影響
        patterns:
          - "(緊急|急|馬上|立刻|嚴重|重大|critical|urgent|asap)"
          - "(影響|導致|造成).*?(業務|生產|客戶|訂單|交易)"
        keywords: [緊急, 急, 馬上, 立刻, 嚴重, 重大, 影響, 業務, 生產, 客戶, critical, urgent]
        examples: [緊急, 影響生產, 客戶無法使用, 業務停擺]

    optional_fields:
      - name: error_message
        display_name: 錯誤訊息
        description: 具體的錯誤訊息或代碼
        patterns:
          - "(?:錯誤|error|exception|訊息)[：:]?\\s*(.+?)(?:[。,，]|$)"
        keywords: [錯誤訊息, error message, exception, log]
        examples: [Connection timeout, NullPointerException, 503 Service Unavailable]

      - name: occurrence_time
        display_name: 發生時間
        description: 問題開始發生的時間
        patterns:
          - "(\\d{1,2}[/:]\\d{2}(?:[/:]\\d{2})?)"
          - "(今天|昨天|剛才|上午|下午|早上|晚上)\\s*\\d*[點時]?"
          - "(\\d+\\s*(?:分鐘|小時|天)前)"
        keywords: [時間, 發生, 開始, 何時, 什麼時候]
        examples: [今天下午 2 點, 剛才, 10 分鐘前]

  request:
    threshold: 0.60
    description: "服務請求完整度檢查"
    required_fields:
      - name: request_type
        display_name: 請求類型
        description: 具體的服務請求類型
        patterns:
          - "(?:申請|請求|需要|想要)[：:]?\\s*([^\\s,，。]+)"
          - "(帳號|權限|軟體|設備|安裝|重設|更換|新增)"
        keywords: [申請, 請求, 需要, 想要, 帳號, 權限, 軟體, 設備, 安裝, 重設, 更換, 新增]
        examples: [帳號申請, 權限變更, 軟體安裝, 密碼重設]

      - name: requester
        display_name: 申請人
        description: 申請服務的人或部門
        patterns:
          - "(?:申請人|使用者|用戶|員工)[：:]?\\s*([^\\s,，。]+)"
          - "(?:為|幫|給)\\s*([^\\s,，。]+)\\s*(?:申請|開)"
        keywords: [申請人, 使用者, 員工, 同事, 部門]
        examples: [張三, 新進員工, 行銷部門]

      - name: justification
        display_name: 申請理由
        description: 申請服務的原因
        patterns:
          - "(?:因為|由於|為了|原因)[：:]?\\s*(.+?)(?:[。,，]|$)"
        keywords: [因為, 由於, 為了, 原因, 需要, 業務]
        examples: [新專案需要, 業務需求, 工作必要]

    optional_fields:
      - name: target_resource
        display_name: 目標資源
        description: 需要存取的具體資源
        patterns:
          - "(?:存取|使用|連接)\\s*([^\\s,，。]+)"
        keywords: [系統, 服務, 資料庫, 資料夾, 檔案, VPN]
        examples: [CRM 系統, 共用資料夾, VPN 存取]

      - name: deadline
        display_name: 期望完成日期
        description: 希望完成的時間
        patterns:
          - "(今天|明天|這週|下週|本週|月底)(?:前)?(?:完成|需要)?"
        keywords: [希望, 期望, 之前, 月底, 週末]
        examples: [下週一前, 月底前, 越快越好]

  change:
    threshold: 0.70
    description: "變更請求完整度檢查"
    required_fields:
      - name: change_type
        display_name: 變更類型
        description: 變更的類型
        patterns:
          - "(?:部署|更新|升級|安裝|配置|修改|調整)[：:]?\\s*([^\\s,，。]+)?"
          - "(release|deploy|update|upgrade|config|patch)"
        keywords: [部署, 更新, 升級, 安裝, 配置, 修改, 調整, release, deploy, update, patch]
        examples: [版本部署, 設定更新, 系統升級, 補丁安裝]

      - name: target_system
        display_name: 目標系統
        description: 要變更的系統
        patterns:
          - "(?:系統|服務|平台|模組)[：:]\\s*([^\\s,，。]+)"
          - "(?:在|對)\\s*([^\\s,，。]+)\\s*(?:上|中|裡)?(?:部署|更新|安裝|修改)"
        keywords: [系統, 服務, 平台, 模組, 伺服器, 環境, 生產, 測試, 開發]
        examples: [訂單系統, 生產環境, API 服務, 資料庫]

      - name: schedule
        display_name: 排程時間
        description: 預計執行的時間
        patterns:
          - "(今晚|明天|週末|下週)(?:的)?(?:維護窗口|時段)?"
        keywords: [預計, 計劃, 排定, 安排, 時間, 日期, 維護窗口, 離峰, 凌晨]
        examples: [下週二 02:00, 維護窗口期間, 週末離峰時段]

    optional_fields:
      - name: version
        display_name: 版本號
        description: 要部署的版本號
        patterns:
          - "(?:版本|version|v)[：:]?\\s*([\\d.]+(?:-[a-zA-Z0-9]+)?)"
        keywords: [版本, version, v, release]
        examples: [v2.1.0, 1.5.3-beta]

      - name: rollback_plan
        display_name: 回滾計劃
        description: 回滾或復原方案
        patterns:
          - "(?:回滾|rollback|復原)[：:]?\\s*(.+?)(?:[。,，]|$)"
        keywords: [回滾, rollback, 復原, 備份, 還原]
        examples: [回滾到前一版本, 使用備份還原]

      - name: impact_assessment
        display_name: 影響評估
        description: 變更的影響範圍
        patterns:
          - "(?:影響|衝擊)[：:]?\\s*(.+?)(?:[。,，]|$)"
        keywords: [影響, 衝擊, 停機, 中斷, 降級]
        examples: [預計停機 30 分鐘, 不影響服務]

  query:
    threshold: 0.50
    description: "查詢完整度檢查"
    required_fields:
      - name: query_type
        display_name: 查詢類型
        description: 具體想查詢什麼
        patterns:
          - "(?:查詢|詢問|了解|知道)[：:]?\\s*([^\\s,，。？?]+)"
          - "(?:如何|怎麼|什麼|哪裡|為什麼)(.+?)(?:[。？?]|$)"
        keywords: [查詢, 詢問, 了解, 知道, 如何, 怎麼, 什麼, 哪裡, 為什麼, 狀態, 進度]
        examples: [系統狀態查詢, 如何重設密碼, 報表在哪裡]

    optional_fields:
      - name: query_subject
        display_name: 查詢主題
        description: 查詢的具體主題
        patterns:
          - "(?:關於|有關|針對)\\s*([^\\s,，。？?]+)"
        keywords: [關於, 有關, 針對, 系統, 單號, 報表]
        examples: [單號 INC123456, ETL 執行狀態]

      - name: time_range
        display_name: 時間範圍
        description: 查詢的時間範圍
        patterns:
          - "(今天|昨天|本週|上週|本月|上月)"
        keywords: [今天, 昨天, 本週, 本月, 從, 到]
        examples: [今天, 本週, 1/1 到 1/15]

  unknown:
    threshold: 0.00
    description: "未知意圖 — 不需要完整度檢查"
    required_fields: []
    optional_fields: []
