# Semantic Router Routes Configuration
# Each route defines example utterances for vector similarity matching.
# Add new routes or utterances without changing code — just restart the service.
#
# Guidelines for adding utterances:
# - Cover formal/informal registers (e.g., 「系統掛了」vs「系統無法使用」)
# - Include Taiwan (繁體) and Hong Kong (粵式書面語) phrasing
# - Mix Chinese + English terms used in IT contexts
# - Target 15-20 utterances per route for robust matching

routes:
  # === INCIDENT ===
