      - "data pipeline 掛了"
      - "ETL 排程失敗"
      - "資料載入出錯"
      - "ETL 跑到一半就停了"
      - "batch job 失敗了"
      - "資料抽取沒跑完"
      - "ETL 報錯了怎麼辦"
      - "資料管線 timeout"
      - "今天的 ETL 沒有正常結束"
      - "data sync 失敗"

