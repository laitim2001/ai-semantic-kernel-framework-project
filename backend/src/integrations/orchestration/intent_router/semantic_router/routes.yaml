# Semantic Router Routes Configuration
# Each route defines example utterances for vector similarity matching.
# Add new routes or utterances without changing code — just restart the service.

routes:
  # === INCIDENT ===
  - name: incident_etl
    category: incident
    sub_intent: etl_failure
    risk_level: high
    workflow_type: magentic
    utterances:
      - "ETL 今天跑失敗了"
      - "ETL job 執行錯誤"
      - "資料管線出問題"
      - "資料同步失敗了"
      - "ETL 任務沒有完成"

  - name: incident_network
    category: incident
    sub_intent: network_issue
    risk_level: high
    workflow_type: magentic
    utterances:
      - "網路連線有問題"
      - "無法連上伺服器"
      - "網路斷線了"
      - "連線一直斷掉"
      - "網路很不穩定"

  - name: incident_performance
    category: incident
    sub_intent: performance_degradation
    risk_level: medium
    workflow_type: magentic
    utterances:
      - "系統跑得很慢"
      - "效能變得很差"
      - "系統響應很慢"
      - "應用程式卡頓"
      - "頁面載入很久"

  - name: incident_system_down
    category: incident
    sub_intent: system_unavailable
    risk_level: critical
    workflow_type: magentic
    utterances:
      - "系統掛掉了"
      - "服務無法使用"
      - "系統完全不能用"
      - "網站打不開"
      - "服務中斷了"

  # === REQUEST ===
  - name: request_account
    category: request
    sub_intent: account_creation
    risk_level: low
    workflow_type: sequential
    utterances:
      - "我需要申請新帳號"
      - "幫我建立帳號"
      - "要開一個新的帳號"
      - "申請系統帳號"
      - "新員工需要帳號"

  - name: request_access
    category: request
    sub_intent: permission_change
    risk_level: medium
    workflow_type: sequential
    utterances:
      - "請幫我開通權限"
      - "需要存取權限"
      - "申請系統權限"
      - "要開放資料夾權限"
      - "沒有權限進入"

  - name: request_software
    category: request
    sub_intent: software_installation
    risk_level: low
    workflow_type: simple
    utterances:
      - "可以幫我安裝軟體嗎"
      - "需要安裝新程式"
      - "申請安裝 Office"
      - "要裝開發工具"
      - "請幫我安裝 VS Code"

  - name: request_password
    category: request
    sub_intent: password_reset
    risk_level: medium
    workflow_type: simple
    utterances:
      - "忘記密碼了"
      - "密碼被鎖住"
      - "需要重設密碼"
      - "帳號無法登入"
      - "密碼過期了"

  # === CHANGE ===
  - name: change_deployment
    category: change
    sub_intent: release_deployment
    risk_level: high
    workflow_type: magentic
    utterances:
      - "需要部署新版本"
      - "上線新功能"
      - "部署更新"
      - "發布新版程式"
      - "準備上 production"

  - name: change_config
    category: change
    sub_intent: configuration_update
    risk_level: medium
    workflow_type: sequential
    utterances:
      - "要修改系統設定"
      - "更新組態配置"
      - "調整系統參數"
      - "修改 config 檔"
      - "變更環境設定"

  - name: change_database
    category: change
    sub_intent: database_change
    risk_level: high
    workflow_type: magentic
    utterances:
      - "資料庫需要變更"
      - "新增資料表欄位"
      - "修改資料庫結構"
      - "更新 schema"
      - "資料庫 migration"

  # === QUERY ===
  - name: query_status
    category: query
    sub_intent: status_inquiry
    risk_level: low
    workflow_type: simple
    utterances:
      - "目前系統狀態如何"
      - "服務運作正常嗎"
      - "現在系統穩定嗎"
      - "檢查系統健康狀態"
      - "服務有問題嗎"

  - name: query_report
    category: query
    sub_intent: report_request
    risk_level: low
    workflow_type: simple
    utterances:
      - "可以給我報表嗎"
      - "需要一份報告"
      - "產出統計數據"
      - "匯出資料報表"
      - "要看使用報告"

  - name: query_ticket
    category: query
    sub_intent: ticket_status
    risk_level: low
    workflow_type: simple
    utterances:
      - "我的工單進度如何"
      - "申請案件處理到哪了"
      - "查詢需求單狀態"
      - "案件編號查詢"
      - "工單什麼時候處理"

  - name: query_documentation
    category: query
    sub_intent: documentation_request
    risk_level: low
    workflow_type: simple
    utterances:
      - "有操作手冊嗎"
      - "系統說明文件在哪"
      - "怎麼使用這個功能"
      - "教我怎麼操作"
      - "有使用教學嗎"
