# =====================================================================
# File: backend/alembic.ini
# Purpose: Alembic configuration for V2 PostgreSQL migrations.
# Category: Infrastructure / Migration tooling
# Scope: Sprint 49.2 (initial Alembic setup)
# Created: 2026-04-29
#
# Notes:
#   - sqlalchemy.url is intentionally NOT set here. env.py loads it from
#     core.config.Settings.database_url so migrations + app share one source.
#   - script_location is relative to this file (backend/).
#   - prepend_sys_path = . allows env.py to `from src.infrastructure.db.base import Base`
#     when invoked as `cd backend && alembic upgrade head`.
# =====================================================================

[alembic]
# Path to migration scripts (relative to this file, i.e. backend/).
script_location = src/infrastructure/db/migrations

# Prepend backend/ to sys.path so env.py can import src.* modules.
prepend_sys_path = .

# Use absolute file paths in version locations.
version_path_separator = os

# Output encoding for generated migration files.
output_encoding = utf-8

# Template for new migration filenames: <revision_id>_<slug>.py
file_template = %%(rev)s_%%(slug)s

# Use UTC for timestamps in migration files.
timezone = UTC

# sqlalchemy.url left blank - env.py overrides via Settings.

# =====================================================================
# Logging configuration
# =====================================================================

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
