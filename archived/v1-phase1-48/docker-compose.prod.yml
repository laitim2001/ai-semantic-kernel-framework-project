# =============================================================================
# IPA Platform - Production Docker Compose
# Sprint 121 -- Story 121-2
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#   docker compose -f docker-compose.prod.yml down
#
# Prerequisites:
#   - Copy .env.example to .env and fill in production values
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Backend (FastAPI + Gunicorn)
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: ipa-backend
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    restart: always
    networks:
      - ipa-prod-network

  # ---------------------------------------------------------------------------
  # Frontend (Nginx + React SPA)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ipa-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      start_period: 5s
      retries: 3
    restart: always
    networks:
      - ipa-prod-network

  # ---------------------------------------------------------------------------
  # PostgreSQL
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: ipa-postgres-prod
    environment:
      POSTGRES_DB: ${DB_NAME:-ipa_platform}
      POSTGRES_USER: ${DB_USER:-ipa_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    ports:
      - "5432:5432"
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ipa_user} -d ${DB_NAME:-ipa_platform}"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5
    restart: always
    networks:
      - ipa-prod-network

  # ---------------------------------------------------------------------------
  # Redis
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: ipa-redis-prod
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redis_password}
      --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_password}", "ping"]
      interval: 10s
      timeout: 5s
      start_period: 5s
      retries: 5
    restart: always
    networks:
      - ipa-prod-network

# =============================================================================
# Networks
# =============================================================================
networks:
  ipa-prod-network:
    driver: bridge

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_prod_data:
  redis_prod_data:
